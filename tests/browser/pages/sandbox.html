<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kensington Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script type="module">
    import { t, signal, computed, effect } from '/esm/kensington.js';

    const countries = [
      { id:  1, name: 'Argentina',          continent: 'South America', population: 45 },
      { id:  2, name: 'Australia',           continent: 'Oceania',       population: 26 },
      { id:  3, name: 'Brazil',              continent: 'South America', population: 215 },
      { id:  4, name: 'Canada',              continent: 'North America', population: 38 },
      { id:  5, name: 'China',               continent: 'Asia',          population: 1412 },
      { id:  6, name: 'Egypt',               continent: 'Africa',        population: 104 },
      { id:  7, name: 'France',              continent: 'Europe',        population: 68 },
      { id:  8, name: 'Germany',             continent: 'Europe',        population: 84 },
      { id:  9, name: 'India',               continent: 'Asia',          population: 1428 },
      { id: 10, name: 'Indonesia',           continent: 'Asia',          population: 277 },
      { id: 11, name: 'Italy',               continent: 'Europe',        population: 59 },
      { id: 12, name: 'Japan',               continent: 'Asia',          population: 125 },
      { id: 13, name: 'Kenya',               continent: 'Africa',        population: 55 },
      { id: 14, name: 'Mexico',              continent: 'North America', population: 128 },
      { id: 15, name: 'Netherlands',         continent: 'Europe',        population: 18 },
      { id: 16, name: 'New Zealand',         continent: 'Oceania',       population: 5 },
      { id: 17, name: 'Nigeria',             continent: 'Africa',        population: 218 },
      { id: 18, name: 'Norway',              continent: 'Europe',        population: 5 },
      { id: 19, name: 'Pakistan',            continent: 'Asia',          population: 231 },
      { id: 20, name: 'Peru',                continent: 'South America', population: 33 },
      { id: 21, name: 'Philippines',         continent: 'Asia',          population: 115 },
      { id: 22, name: 'Poland',              continent: 'Europe',        population: 38 },
      { id: 23, name: 'Russia',              continent: 'Europe',        population: 144 },
      { id: 24, name: 'Saudi Arabia',        continent: 'Asia',          population: 36 },
      { id: 25, name: 'South Africa',        continent: 'Africa',        population: 60 },
      { id: 26, name: 'South Korea',         continent: 'Asia',          population: 52 },
      { id: 27, name: 'Spain',               continent: 'Europe',        population: 47 },
      { id: 28, name: 'Sweden',              continent: 'Europe',        population: 10 },
      { id: 29, name: 'Tanzania',            continent: 'Africa',        population: 63 },
      { id: 30, name: 'Thailand',            continent: 'Asia',          population: 72 },
      { id: 31, name: 'Turkey',              continent: 'Asia',          population: 85 },
      { id: 32, name: 'Ukraine',             continent: 'Europe',        population: 44 },
      { id: 33, name: 'United Kingdom',      continent: 'Europe',        population: 67 },
      { id: 34, name: 'United States',       continent: 'North America', population: 331 },
      { id: 35, name: 'Vietnam',             continent: 'Asia',          population: 98 },
    ];

    const query   = signal('');
    const sortKey = signal(localStorage.getItem('sortKey') ?? 'name');
    const sortAsc = signal(localStorage.getItem('sortAsc') !== 'false');

    effect(() => {
      localStorage.setItem('sortKey', sortKey.get());
      localStorage.setItem('sortAsc', String(sortAsc.get()));
    });

    const processedCountries = computed(() => {
      const q = query.get().toLowerCase();
      return countries
        .filter(c => c.name.toLowerCase().includes(q) || c.continent.toLowerCase().includes(q))
        .sort((a, b) => {
          const key = sortKey.get();
          const dir = sortAsc.get() ? 1 : -1;
          if (key === 'population') {
            return (a.population - b.population) * dir;
          }
          return a[key].localeCompare(b[key]) * dir;
        });
    });

    function handleSort(key) {
      if (sortKey.get() === key) {
        sortAsc.set(v => !v);
      } else {
        sortKey.set(key);
        sortAsc.set(true);
      }
    }

    function sortHeader(label, key) {
      return t.th(
        t.button({
          type: 'button',
          class: 'btn btn-link p-0 text-decoration-none fw-semibold text-body',
          onclick: () => { handleSort(key); },
        }, [
          computed(() => sortKey.get() !== key ? label : `${label} ${sortAsc.get() ? '↑' : '↓'}`)
        ]),
      );
    }

    const app = t.div({ class: 'container mt-4' }, [
      t.h1('Countries'),
      t.div({ class: 'row mb-3 align-items-center' }, [
        t.div({ class: 'col-md-6' }, [
          t.input({
            type: 'search',
            class: 'form-control',
            placeholder: 'Search by name or continent…',
            oninput: e => query.set(e.target.value),
          }),
        ]),
        t.div({ class: 'col-md-2 text-muted small mt-2 mt-md-0 text-md-end' }, [
          computed(() => `${processedCountries.get().length} of ${countries.length} countries`)
        ]),
        t.div({ class: 'col-md-4' }, [
          t.table({ id:'query-summary', class: 'table table-sm table-bordered w-auto small ms-auto' }, t.tbody([
            t.tr([t.th('query'), t.td({ style: { minWidth: '200px;' } }, query)]),
            t.tr([t.th('sortKey'), t.td(sortKey)]),
            t.tr([t.th('sortAsc'), t.td(sortAsc.transform(String))]),
          ]))
        ]),
      ]),
      t.table({
        class: computed(() => `table table-hover${processedCountries.get().length < countries.length ? ' table-primary' : ''}`)
      }, [
        t.thead(t.tr([
          sortHeader('Country', 'name'),
          sortHeader('Continent', 'continent'),
          sortHeader('Population', 'population'),
        ])),
        t.tbody(computed(() => processedCountries.get().map(c =>
          t.tr({ dataKey: c.id }, [
            t.td(c.name),
            t.td(c.continent),
            t.td({ class: 'text-end' }, `${c.population}M`),
          ]),
        ))),
      ]),
    ]);

    document.body.append(app.toElement());
  </script>
</head>
<body>
</body>
</html>
