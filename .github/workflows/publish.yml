name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '23'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Set up test symlinks
        run: |
          mkdir -p tests/esm/node_modules tests/cjs/node_modules tests/typescript/node_modules
          ln -s "$(pwd)" tests/esm/node_modules/kensington
          ln -s "$(pwd)" tests/cjs/node_modules/kensington
          ln -s "$(pwd)" tests/typescript/node_modules/kensington

      - name: Install Playwright browsers
        run:  npx playwright install --with-deps

      - name: Build CJS and browser bundles
        run: npm run build-cjs && npm run build-browser

      - name: Test
        run: npm test

      - name: Publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-"* ]]; then
            PREID=$(echo "$VERSION" | sed 's/.*-\([^.]*\)\..*/\1/')
            npm publish --provenance --access public --tag "$PREID"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
